name: IndexNow

on:
  deployment_status:
  workflow_dispatch:

jobs:
  submit:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.deployment_status.state == 'success' && github.event.deployment.ref == 'main') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Submit updated discovery URLs
        run: npm run indexnow:submit
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
